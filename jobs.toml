[jobs.example-ping]
description = "Example ping to httpbin"
schedule = "every hour"
webhook = "https://httpbin.org/post"
timezone = "Africa/Casablanca"
enabled = true
retry = 1
timeout = 10
start_time = "08:00"
stop_time = "22:00"
notify_on_failure = []

[jobs.example-daily]
description = "Example daily job"
schedule = "every day at 09:00"
webhook = "https://httpbin.org/post"
timezone = "Africa/Casablanca"
enabled = true
retry = 2
timeout = 30
notify_on_failure = []

[jobs.test-local]
description = "Test job hitting local Python server — fires every minute"
schedule = "every 1 minutes"
webhook = "http://localhost:4444"
timezone = "Africa/Casablanca"
enabled = true
retry = 0
timeout = 15
notify_on_failure = []


[jobs.monthly-fee-reminder]
description = "Send monthly maintenance fee reminder to residents"
schedule = "every 30 days"
webhook = "http://localhost:4444"
timezone = "Africa/Casablanca"
enabled = true
retry = 3
timeout = 30
notify_on_failure = []

